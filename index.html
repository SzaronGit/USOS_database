<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój plan zajęć - USOSweb</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header-container">
        <div class="header-left">
            <div class="logo-container">
                <div class="usos-logo">U</div>
                <span class="usos-text">USOS<span>web</span></span>
            </div>

            <nav class="header-tabs">
                <span class="active-tab">MÓJ USOSWEB</span>
            </nav>
        </div>

        <div class="profile-container">
            <div class="profile-info">
                <div id="currentUserLabel" class="profile-name">Ładowanie...</div>
                <div id="currentIndexLabel" class="profile-index">indeks: ------</div>
            </div>
            <div class="avatar-circle">
                <img src="img/avatar.png" alt="Avatar" class="avatar-img" />
            </div>
        </div>
    </header>

    <div class="layout-wrapper">
        
        <aside class="sidebar-nav">
            <div>
                <div class="student-selector-box">
                    <label for="studentSelect" class="selector-label">
                        Wybór studenta (Symulacja):
                    </label>
                    <select id="studentSelect" class="student-select">
                        <!-- Opcje będą dynamicznie wypełniane z API -->
                    </select>
                </div>

                <div class="menu-section">
                    <div class="menu-section-label">Skróty</div>
                    <nav class="menu-list">
                        <a href="index.html" class="menu-link-active">
                            <img src="img/callendar.png" alt="Plan" class="menu-icon" />
                            <span>PLAN ZAJĘĆ</span>
                        </a>
                        <a href="zapisy.html" class="menu-link">
                            <img src="img/sign.png" alt="Rejestracja" class="menu-icon" />
                            <span>REJESTRACJA NA ZAJĘCIA</span>
                        </a>
                    </nav>
                </div>
            </div>

            <div class="sidebar-bottom">
                <button id="resetDbBtn" class="reset-db-btn">
                    <img src="img/reset.png" alt="Reset" class="reset-icon" />
                    <span>Zresetuj bazę danych</span>
                </button>
            </div>
        </aside>

        <main class="content-main">
            <section class="content-section">
                <div class="title-container">
                    <h1 class="main-title">Mój plan zajęć</h1>
                </div>

                <div class="week-navigation">
                    <button id="prevWeekBtn" class="nav-text-btn">
                        <span>&lt; wcześniej</span>
                    </button>
                    
                    <div class="week-range-container">
                        <span id="dateRangeText">2026-05-25 - 2026-05-31</span>
                        <span id="weekParityText" class="week-parity-badge" title="Tydzień parzysty / nieparzysty">TP</span>
                    </div>

                    <button id="nextWeekBtn" class="nav-text-btn">
                        <span>później &gt;</span>
                    </button>
                </div>

                <div class="timetable-outer-container">
                    <div class="timetable-inner-container">
                        <div id="timetableGrid" class="timetable-grid">
                            <div class="grid-top-left-cell"></div>
                            <div class="weekday-header weekday-header-mon">Poniedziałek</div>
                            <div class="weekday-header weekday-header-tue">Wtorek</div>
                            <div class="weekday-header weekday-header-wed">Środa</div>
                            <div class="weekday-header weekday-header-thu">Czwartek</div>
                            <div class="weekday-header weekday-header-fri">Piątek</div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="toast">
        <span id="toastIcon" class="toast-icon"></span>
        <span id="toastText">Toast message placeholder</span>
    </div>

    <script src="index.js"></script>
</body>
</html>
