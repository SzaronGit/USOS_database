<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia operacji - ASRPweb</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header-container">
        <div class="header-left">
            <div class="logo-container">
                <div class="asrp-logo">A</div>
                <span class="asrp-text">ASRP<span>web</span></span>
            </div>

            <nav class="header-tabs">
                <span class="active-tab">Akademicki System Rezerwacji Przedmiotów</span>
            </nav>
        </div>

        <div class="profile-container">
            <div class="profile-info">
                <div id="currentUserLabel" class="profile-name">Ładowanie...</div>
                <div id="currentIndexLabel" class="profile-index">rola: ------</div>
            </div>
            <div class="avatar-circle">
                <img src="img/avatar.png" alt="Avatar" class="avatar-img" />
            </div>
        </div>
    </header>

    <div class="layout-wrapper">
        <aside class="sidebar-nav">
            <div>
                <div class="student-selector-box">
                    <label for="roleSelect" class="selector-label">Rola Użytkownika:</label>
                    <select id="roleSelect" class="student-select" style="margin-bottom: 12px;">
                        <option value="student">Student</option>
                        <option value="teacher">Prowadzący</option>
                    </select>
                    
                    <label for="userSelect" id="userSelectLabel" class="selector-label">Użytkownik:</label>
                    <select id="userSelect" class="student-select">
                        <!-- Opcje będą dynamicznie wypełniane z API -->
                    </select>
                </div>

                <div class="menu-section">
                    <div class="menu-section-label">Skróty</div>
                    <nav class="menu-list" id="sidebarMenu">
                        <a href="index.html" class="menu-link" id="planLink">
                            <img src="img/callendar.png" alt="Plan" class="menu-icon" />
                            <span>PLAN ZAJĘĆ</span>
                        </a>
                        <a href="zapisy.html" class="menu-link" id="actionLink">
                            <img src="img/sign.png" alt="Rejestracja" class="menu-icon" />
                            <span>REJESTRACJA NA ZAJĘCIA</span>
                        </a>
                        <a href="zajecia.html" class="menu-link" id="catalogLink">
                            <img src="img/info.png" alt="Spis" class="menu-icon" />
                            <span>SPIS ZAJĘĆ</span>
                        </a>
                        <a href="historia.html" class="menu-link-active" id="historyLink">
                            <img src="img/reset.png" alt="Historia" class="menu-icon" style="filter: hue-rotate(90deg);" />
                            <span>HISTORIA</span>
                        </a>
                    </nav>
                </div>
            </div>

            <div class="sidebar-bottom">
                <button id="resetDbBtn" class="reset-db-btn">
                    <img src="img/reset.png" alt="Reset" class="reset-icon" />
                    <span>Zresetuj bazę danych</span>
                </button>
            </div>
        </aside>

        <main class="content-main">
            <section class="content-section">
                <div class="title-container">
                    <h1 class="main-title">Dziennik zdarzeń i historia działań</h1>
                </div>

                <div class="search-bar-container">
                    <input type="text" id="searchBar" class="search-input-field" placeholder="Filtruj logi po użytkowniku, akcji lub opisie...">
                </div>

                <div id="logsContainer" class="timeline-container">
                    <!-- Dynamiczne wiersze logów z API -->
                    <div style="text-align: center; padding: 48px; color: #64748b;">Ładowanie historii działań...</div>
                </div>
            </section>
        </main>
    </div>

    <div id="toast">
        <span id="toastIcon" class="toast-icon"></span>
        <span id="toastText">Toast message placeholder</span>
    </div>

    <script src="historia.js"></script>
</body>
</html>
